<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plugin Test Harness</title>
  <style>
    body { font-family: system-ui; padding: 20px; }
    iframe { border: 1px solid #ccc; width: 100%; height: 600px; }
    button { padding: 8px 16px; margin: 4px; }
  </style>
</head>
<body>
  <h1>Plugin Test Harness</h1>
  <p>
    <input type="file" id="epubInput" accept=".epub" style="padding: 8px 16px; margin: 4px;">
    <button id="initBtn">Initialize with Selected EPUB</button>
    <button id="clearBtn">Clear</button>
  </p>
  <div id="status"></div>
  <iframe id="pluginFrame" src="./plugin.html"></iframe>

  <script>
    let pluginInitialized = false;
    let pluginReady = false;

    function showStatus(msg, type = 'info') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.padding = '10px';
      el.style.borderRadius = '4px';
      el.style.marginBottom = '10px';
      el.style.color = type === 'error' ? '#dc3545' : '#0066cc';
      el.style.backgroundColor = type === 'error' ? '#ffebee' : '#e8f1ff';
    }

    async function initializePlugin(selectedFile = null) {
      try {
        // Wait for plugin to be ready
        if (!pluginReady) {
          showStatus('Waiting for plugin to initialize...');
          await new Promise(resolve => {
            const checkReady = setInterval(() => {
              if (pluginReady) {
                clearInterval(checkReady);
                resolve();
              }
            }, 100);
            // Timeout after 5 seconds
            setTimeout(() => {
              clearInterval(checkReady);
              resolve();
            }, 5000);
          });
        }

        const opfsRoot = await navigator.storage.getDirectory();

        if (selectedFile) {
          showStatus(`Writing "${selectedFile.name}" to OPFS...`);
          const opfsFileHandle = await opfsRoot.getFileHandle(selectedFile.name, { create: true });
          const writable = await opfsFileHandle.createWritable();
          await writable.write(selectedFile);
          await writable.close();
        }

        showStatus(`Initializing plugin with OPFS directory...`);

        // Send the OPFS root directory to the plugin
        const pluginFrame = document.getElementById('pluginFrame');
        pluginFrame.contentWindow.postMessage({
          type: 'init',
          projectId: 'test-project',
          opfsDirHandle: opfsRoot,
        }, window.origin);

        pluginInitialized = true;
        showStatus(selectedFile ? `Plugin initialized with "${selectedFile.name}"` : 'Plugin initialized with OPFS directory');
      } catch (err) {
        console.error('Error:', err);
        showStatus(`Error: ${err.message}`, 'error');
      }
    }

    // Listen for plugin ready message
    window.addEventListener('message', (event) => {
      if (event.origin !== window.origin) return;
      if (event.data.type === 'plugin-ready') {
        pluginReady = true;
        // Initialize with existing OPFS content
        if (!pluginInitialized) {
          initializePlugin();
        }
      }
    });

    // Also wait for iframe to load and plugin to signal ready
    document.addEventListener('DOMContentLoaded', () => {
      // Plugin should send ready signal, then we initialize
      // If no signal after 3 seconds, try anyway
      setTimeout(() => {
        if (!pluginInitialized && !pluginReady) {
          initializePlugin();
        }
      }, 3000);
    });

    document.getElementById('initBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('epubInput');
      if (!fileInput.files.length) {
        showStatus('Please select an EPUB file first', 'error');
        return;
      }
      const selectedFile = fileInput.files[0];
      await initializePlugin(selectedFile);
      fileInput.value = '';
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('pluginFrame').src = './plugin.html';
      document.getElementById('status').textContent = '';
      document.getElementById('epubInput').value = '';
    });
  </script>
</body>
</html>
