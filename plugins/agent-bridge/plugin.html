<!doctype html>
<html lang="en">
  <!--
    Agent Bridge (dev-only spike) — the tab-side half of the W6 live-session
    bridge (process/AGENT_AUTHORING_WORKFLOWS.md). Connects OUT to the local
    MCP bridge process (scripts/agent-bridge.mjs) over ws://localhost:8747 and
    serves READ-ONLY project requests against the workspace handle the host
    hands every panel plugin.

    Deliberately not translated and not styled with the design system: this
    plugin is devOnly (excluded from the production manifest) and exists to
    prove the transport. No pairing token for the same reason — read-only,
    localhost, dev.
  -->
  <head>
    <meta charset="utf-8" />
    <title>Agent Bridge (dev)</title>
    <style>
      :root[data-theme='dark'] body {
        background: #1f2226;
        color: #dde1e6;
      }
      body {
        font: 13px/1.5 ui-monospace, monospace;
        margin: 0;
        padding: 0.75rem 1rem;
      }
      .state {
        font-weight: 600;
      }
      .state[data-ok='true'] {
        color: #2e7d32;
      }
      .state[data-ok='false'] {
        color: #b3261e;
      }
      ol {
        margin: 0.5rem 0 0;
        padding-left: 1.5rem;
        max-height: 10rem;
        overflow-y: auto;
      }
      li {
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <div>bridge: <span id="state" class="state" data-ok="false">waiting for project…</span></div>
    <ol id="log"></ol>
    <script>
      (() => {
        const WS_URL = 'ws://localhost:8747';
        const stateEl = document.getElementById('state');
        const logEl = document.getElementById('log');
        let workspaceDir = null;
        let projectId = null;
        let socket = null;

        const setState = (text, ok) => {
          stateEl.textContent = text;
          stateEl.dataset.ok = String(ok);
        };
        const log = text => {
          const li = document.createElement('li');
          li.textContent = text;
          logEl.appendChild(li);
          while (logEl.children.length > 50) logEl.removeChild(logEl.firstChild);
          li.scrollIntoView({ block: 'nearest' });
        };

        // --- host handshake (the standard panel-plugin contract) -------------
        window.parent.postMessage({ type: 'plugin-ready', pluginType: 'agent-bridge' }, '*');

        // Standalone mode: panel plugins have no generic host surface yet, so
        // for the spike this page also works opened directly as a tab
        // (http://localhost:5173/plugins/agent-bridge/plugin.html). Same
        // origin means the same OPFS and localStorage: resolve the active
        // workspace the app persisted and skip the host handshake.
        if (window === window.parent) {
          (async () => {
            const workspaceId = localStorage.getItem('seedhtml_app_workspace_id');
            if (!workspaceId) {
              setState('no active project (open one in SEED first)', false);
              return;
            }
            projectId = workspaceId;
            workspaceDir = await resolveByPath(['workspaces', workspaceId]);
            setState('project ready (standalone), connecting…', false);
            connect();
          })();
        }

        window.addEventListener('message', async event => {
          const data = event.data;
          if (!data || typeof data !== 'object') return;
          if (data.type === 'context' && (data.theme === 'dark' || data.theme === 'light')) {
            document.documentElement.dataset.theme = data.theme;
          }
          if (data.type === 'init' && typeof data.projectId === 'string') {
            projectId = data.projectId;
            workspaceDir = data.opfsDirHandle ?? (await resolveByPath(data.opfsDirPath));
            setState('project ready, connecting…', false);
            connect();
          }
        });

        async function resolveByPath(segments) {
          if (!Array.isArray(segments)) return null;
          let dir = await navigator.storage.getDirectory();
          for (const segment of segments) dir = await dir.getDirectoryHandle(segment);
          return dir;
        }

        // --- bridge socket ----------------------------------------------------
        function connect() {
          if (!workspaceDir) return;
          socket = new WebSocket(WS_URL);
          socket.onopen = () => {
            setState('connected to ' + WS_URL, true);
            socket.send(JSON.stringify({ hello: 'seed-agent-bridge', projectId }));
          };
          socket.onclose = () => {
            setState('bridge not running — retrying…', false);
            setTimeout(connect, 3000);
          };
          socket.onmessage = async event => {
            let request;
            try {
              request = JSON.parse(event.data);
            } catch {
              return;
            }
            if (!request || typeof request.id !== 'number' || typeof request.tool !== 'string')
              return;
            log(`${request.tool} ${JSON.stringify(request.params ?? {})}`);
            try {
              const result = await handle(request.tool, request.params ?? {});
              socket.send(JSON.stringify({ id: request.id, ok: true, result }));
            } catch (error) {
              socket.send(
                JSON.stringify({ id: request.id, ok: false, error: String(error?.message ?? error) })
              );
            }
          };
        }

        // --- read-only tools --------------------------------------------------
        async function handle(tool, params) {
          switch (tool) {
            case 'project_info':
              return { projectId };
            case 'list_files': {
              const files = [];
              await walk(workspaceDir, '', files);
              files.sort((a, b) => a.path.localeCompare(b.path));
              return { files };
            }
            case 'read_file': {
              if (typeof params.path !== 'string') throw new Error('path required');
              const file = await (await resolveFile(params.path)).getFile();
              if (file.size > 512 * 1024) return { binary: true, size: file.size };
              const bytes = new Uint8Array(await file.arrayBuffer());
              // NUL byte in the first KB → treat as binary, report size only
              if (bytes.slice(0, 1024).includes(0)) return { binary: true, size: file.size };
              return { text: new TextDecoder().decode(bytes), size: file.size };
            }
            default:
              throw new Error('unknown tool: ' + tool);
          }
        }

        async function walk(dir, prefix, out) {
          for await (const [name, entry] of dir.entries()) {
            const path = prefix ? prefix + '/' + name : name;
            if (entry.kind === 'directory') await walk(entry, path, out);
            else out.push({ path, size: (await entry.getFile()).size });
          }
        }

        async function resolveFile(path) {
          const parts = path.split('/').filter(Boolean);
          if (parts.some(p => p === '..')) throw new Error('invalid path');
          let dir = workspaceDir;
          for (const part of parts.slice(0, -1)) dir = await dir.getDirectoryHandle(part);
          return dir.getFileHandle(parts[parts.length - 1]);
        }
      })();
    </script>
  </body>
</html>
