<div
  id="book-container"
  style="border: 1px solid grey; height: 600px; margin: 1em 0px; width: 100%"
></div>

<div class="reader-controls">
  <button onclick="prevPage()">‹ Previous</button> Page
  <button onclick="nextPage()">Next ›</button>
  <button onclick="toggleSpread()">Toggle spread</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>

<script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

<script>
  var url =
    'https://seed-samples.pages.dev/' +
    encodeURIComponent('Letter from Kenya - Stewart Haines - 2025-10-01.epub');

  // Ensure the URL is correctly encoded for the web
  var book = ePub(url);

  // Render the book into the container div
  var rendition = book.renderTo('book-container', {
    allowScriptedContent: true,
    width: '100%',
    height: '100%',
  });

  // Display the book. This is the crucial step that was missing.
  rendition.display();

  function toggleSpread() {
    var spread = rendition.layout().spread() ? 'none' : 'auto';
    rendition.spread(spread);
  }

  function nextPage() {
    rendition.next();
  }

  function prevPage() {
    rendition.prev();
  }
</script>
