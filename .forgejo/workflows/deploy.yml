name: Deploy to Cloudflare Pages

# Manual-trigger only (2026-07-18): Codeberg action runners are so rarely
# available that push-triggered deploys sat queued for days. Production
# deploys happen locally instead — `npm run build:i18n && npm run
# build:plugins && npm run deploy` — see docs/DEPLOYMENT.md. This workflow
# stays for the day runners are dependable again.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: codeberg-medium

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app (i18n + main)
        run: npm run build:i18n

      - name: Build plugins
        run: npm run build:plugins

      - name: Deploy to Cloudflare Pages
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
